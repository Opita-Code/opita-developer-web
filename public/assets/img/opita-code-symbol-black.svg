<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <title>Opita Code — Symbol (Black)</title>
  <desc>Concepto 01: four interlaced ribbon forms around a central diamond negative space. Provisional — versión inicial.</desc>
  <g stroke="#0D0D0D" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- South ribbon (under) -->
    <path d="M 190,180 C 190,236 66,236 66,180"/>
    <!-- East ribbon (over south) -->
    <path d="M 188,66 C 244,66 244,190 180,190"/>
    <!-- North ribbon (over east) -->
    <path d="M 60,80 C 60,18 196,18 196,78"/>
    <!-- West ribbon (over north) -->
    <path d="M 80,190 C 14,190 14,66 78,68"/>
  </g>
</svg>
